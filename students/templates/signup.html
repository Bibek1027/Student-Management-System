{% extends 'base.html' %}

{% block content %}

<div class="card student-card mx-auto mt-5" style="max-width: 500px;">

    <div class="card-body">

        <h3 class="text-center mb-4">
            <i class="bi bi-person-plus-fill"></i>
            Sign Up
        </h3>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success w-100">
                Create Account
            </button>

        </form>

    </div>

</div>

{% endblock %}
