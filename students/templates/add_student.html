{% extends 'base.html' %}

{% block content %}

<div class="card student-card mx-auto" style="max-width: 600px;">

    <div class="card-body">

        <h3 class="mb-4">
            <i class="bi bi-person-plus-fill"></i>
            Add Student
        </h3>

        <hr>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-primary mt-2">
                Save Student
            </button>

            <a href="/" class="btn btn-secondary mt-2">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
