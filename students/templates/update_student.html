{% extends 'base.html' %}

{% block content %}

<div class="card student-card mx-auto" style="max-width: 600px;">

    <div class="card-body">

        <h3 class="mb-4">
            <i class="bi bi-pencil-square"></i>
            Update Student
        </h3>

        <hr>

        <form method="POST">

            {% csrf_token %}

            <!-- Django automatically fills existing data because of UpdateView -->
            {{ form.as_p }}

            <button type="submit" class="btn btn-warning mt-2">
                Update Student
            </button>

            <a href="/" class="btn btn-secondary mt-2">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
